[theme]
# Base de la que heredamos
base = "dark"

# Color de acento (Botones principales, radios, etc.) - Negro para contraste total
primaryColor = "#000000"

# Fondo principal de la app (Tu rojo corporativo plano)
backgroundColor = "#e34c48"

# Fondo de los widgets (Selectbox, Inputs) - Blanco puro para que se lea perfecto
secondaryBackgroundColor = "#8b1e1e"

# Color del texto general - Negro (para los widgets blancos) o Blanco (para el fondo rojo)
# Nota: Streamlit lo gestionará según el fondo, pero lo forzamos a Negro para los widgets.
textColor = "#000000"

# Tipografía y Estilo
font = "sans-serif"
headingFont = "sans-serif"
baseFontSize = 16
baseFontWeight = 400

# Bordes (Para que parezca una app moderna, no cuadrada)
# 'large' da ese toque circular a botones y cajas
baseRadius = "large"
buttonRadius = "large"

# Bordes de widgets
showWidgetBorder = true
borderColor = "#000000"

# Colores para Gráficos (Si algún día metes estadísticas de goles/puntos)
# Usamos una paleta que combine con el rojo y blanco
chartCategoricalColors = ["#000000", "#e34c48", "#555555", "#ffffff"]

[theme.sidebar]
# El Sidebar lo ponemos Blanco para que "corte" visualmente el rojo del fondo
backgroundColor = "#8b1e1e"
secondaryBackgroundColor = "#a52a2a" # Un gris muy tenue para los inputs del sidebar
textColor = "#ffffff"
primaryColor = "#ffffff" # Los iconos/acentos del sidebar en tu rojo

[server]
headless = true
