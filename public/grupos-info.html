<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Información de Grupos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red:       #cc0000;
    --red-dark:  #8b0000;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body:    'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0000;
    color: white;
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: auto;
  }

  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 32px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.4);
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(6px);
  }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
    box-shadow: 0 0 8px var(--red);
  }
  h1 {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .bracket-outer {
    padding: 40px 32px;
    overflow: auto;
    min-height: calc(100vh - 65px);
  }
  .bracket { position: relative; min-width: max-content; }

  .phase-label {
    font-family: var(--font-display);
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--red);
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(204,0,0,0.3);
  }

  .match {
    background: var(--red-dark);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(204,0,0,0.3);
  }
  .match-header {
    background: var(--red);
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .match-name {
    font-family: var(--font-display);
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: white;
  }
  .match-notes {
    font-size: 10px; font-weight: 400;
    color: rgba(255,255,255,0.82);
    font-style: italic;
    font-family: var(--font-body);
    text-transform: none; letter-spacing: normal;
    line-height: 1.4;
  }

  #loading {
    position: fixed; inset: 0;
    background: #1a0000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 200;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(204,0,0,0.2);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p {
    font-family: var(--font-display);
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.4);
  }

  #error-msg {
    margin: 32px; padding: 20px 24px;
    background: rgba(204,0,0,0.15);
    border: 1px solid rgba(204,0,0,0.4);
    border-radius: 10px;
    font-size: 14px; line-height: 1.6;
    color: rgba(255,255,255,0.7);
    display: none;
  }
  #error-msg strong { color: white; display: block; margin-bottom: 6px; font-size: 16px; }

  #btn-download {
    margin-left: auto;
    padding: 7px 16px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 7px;
    font-family: var(--font-display);
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  #btn-download:hover { background: var(--red-dark); }
  #btn-download:disabled { opacity: 0.5; cursor: wait; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

let   shieldSrc     = null; // set by preloadShield()

async function preloadShield() {
  try {
    const res  = await fetch(SHIELD_REMOTE);
    const blob = await res.blob();
    shieldSrc  = await new Promise((ok, fail) => {
      const r = new FileReader();
      r.onload  = () => ok(r.result);
      r.onerror = fail;
      r.readAsDataURL(blob);
    });
  } catch {
    shieldSrc = SHIELD_REMOTE; // CORS unavailable: displays in browser, skipped in PDF
  }
}

function sbHeaders() {
  return {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    "Accept": "application/json",
  };
}

async function sbGet(table, params) {
  const url = SUPABASE_URL + "/rest/v1/" + table + (params ? "?" + params : "");
  const res = await fetch(url, { headers: sbHeaders() });
  if (!res.ok) throw new Error(table + " (" + res.status + "): " + await res.text());
  return res.json();
}

function showError(msg) {
  document.getElementById("loading").style.display = "none";
  const el = document.getElementById("error-msg");
  el.innerHTML = "<strong>Error</strong> " + msg;
  el.style.display = "block";
}

async function init() {
  try {
    await Promise.all([loadData(), preloadShield()]);
    document.getElementById("loading").style.display = "none";
    if (!fases.length) { showError("No hay fases en la base de datos."); return; }
    render();
  } catch(err) {
    showError(err.message);
    console.error(err);
  }
}

async function loadData() {
  const torneoId = new URLSearchParams(window.location.search).get("torneo");
  const fasesParams = (torneoId ? "torneo_id=eq." + torneoId + "&" : "") + "select=*&order=orden";

  const [f, t] = await Promise.all([
    sbGet("fases", fasesParams),
    torneoId ? sbGet("torneos", "select=id,nombre&id=eq." + torneoId) : Promise.resolve([]),
  ]);

  fases      = f;
  torneoData = (t && t.length) ? t[0] : null;

  if (torneoData?.nombre) {
    document.getElementById("bracket-title").textContent = torneoData.nombre;
    document.title = torneoData.nombre;
  }

  if (fases.length) {
    const faseIds = fases.map(f => f.id).join(",");
    grupos = await sbGet("grupos", "select=*&fase_id=in.(" + faseIds + ")");
  }
}

// ── CARD HEIGHT ───────────────────────────────────────────
// Header only: name row (~22px) + optional notes row(s) + padding
function CARD_H(g) {
  if (!g.notas) return 38;
  // Estimate ~14px per line of notes (generous)
  const lines = g.notas.split("\n").length;
  return 38 + lines * 15;
}

// ── RENDER ────────────────────────────────────────────────
function renderGroupCard(g) {
  const notasHtml = g.notas
    ? `<span class="match-notes">${g.notas}</span>`
    : "";
  return `<div class="match">
    <div class="match-header">
      <span class="match-name">${g.nombre}</span>
      ${notasHtml}
    </div>
  </div>`;
}

function getPhasesSorted() {
  return [...fases].sort((a, b) => a.orden - b.orden);
}

function render() {
  const wrapper = document.getElementById("bracket");
  wrapper.innerHTML = "";

  const phasesSorted = getPhasesSorted();
  if (!phasesSorted.length) return;

  const firstPhase = phasesSorted[0];
  const phase1Groups = grupos
    .filter(g => g.fase_id === firstPhase.id)
    .sort((a, b) => {
      const oA = (a.orden_cuadro != null) ? a.orden_cuadro : Infinity;
      const oB = (b.orden_cuadro != null) ? b.orden_cuadro : Infinity;
      if (oA !== oB) return oA - oB;
      const nA = parseInt(a.nombre.match(/\d+/)?.[0] ?? "0");
      const nB = parseInt(b.nombre.match(/\d+/)?.[0] ?? "0");
      return nA !== nB ? nA - nB : a.nombre.localeCompare(b.nombre);
    });

  const mid = Math.ceil(phase1Groups.length / 2);
  const leftGroups  = phase1Groups.slice(0, mid);
  const rightGroups = phase1Groups.slice(mid);

  function buildCols(seeds) {
    const cols = [seeds];
    let current = seeds;
    for (let i = 0; i < phasesSorted.length; i++) {
      const nextIds = [...new Set(current.map(g => g.siguiente_grupo_id).filter(Boolean))];
      if (!nextIds.length) break;
      const next   = nextIds.map(id => grupos.find(g => g.id === id)).filter(Boolean);
      const unique = [...new Map(next.map(g => [g.id, g])).values()];
      if (!unique.length) break;
      cols.push(unique);
      current = unique;
    }
    return cols;
  }

  const leftCols  = buildCols(leftGroups);
  const rightCols = buildCols(rightGroups);

  // Detect shared final
  const leftLastIds  = new Set(leftCols[leftCols.length - 1].map(g => g.id));
  const sharedFinal  = rightCols[rightCols.length - 1].filter(g => leftLastIds.has(g.id));
  let centerGroups   = [];
  if (sharedFinal.length) {
    centerGroups = leftCols.pop();
    rightCols.pop();
  }

  const MATCH_W   = 160;
  const COL_GAP   = 28;
  const CARD_GAP  = 10;
  const totalCols = leftCols.length + 1 + rightCols.length;
  const totalW    = totalCols * MATCH_W + (totalCols - 1) * COL_GAP;

  // Vertical layout helpers
  function computeYCenters(groups, totalH) {
    const totalCardsH  = groups.reduce((s, g) => s + CARD_H(g), 0);
    const totalGapsH   = (groups.length - 1) * CARD_GAP;
    const extra        = Math.max(0, totalH - totalCardsH - totalGapsH);
    const extraPerCard = extra / groups.length;
    const centers = [];
    let y = 0;
    groups.forEach(g => {
      const h = CARD_H(g) + extraPerCard;
      centers.push(y + h / 2);
      y += h + CARD_GAP;
    });
    return centers;
  }

  const phase1H = leftGroups.reduce((s, g) => s + CARD_H(g) + CARD_GAP, 0);
  const totalH  = Math.max(phase1H, 200);

  const leftYCenters  = computeYCenters(leftGroups, totalH);
  const rightYCenters = computeYCenters(rightGroups, totalH);

  function computeColYCenters(col, prevCol, prevYCenters) {
    return col.map(g => {
      const sources = prevCol.filter(pg => pg.siguiente_grupo_id === g.id);
      if (!sources.length) return totalH / 2;
      const ys = sources.map(s => {
        const idx = prevCol.findIndex(pg => pg.id === s.id);
        return prevYCenters[idx] ?? totalH / 2;
      });
      return ys.reduce((a, b) => a + b, 0) / ys.length;
    });
  }

  const leftColYCenters  = [leftYCenters];
  const rightColYCenters = [rightYCenters];
  for (let i = 1; i < leftCols.length; i++)
    leftColYCenters.push(computeColYCenters(leftCols[i], leftCols[i-1], leftColYCenters[i-1]));
  for (let i = 1; i < rightCols.length; i++)
    rightColYCenters.push(computeColYCenters(rightCols[i], rightCols[i-1], rightColYCenters[i-1]));

  // ── DOM BUILD ─────────────────────────────────────────
  const SHIELD_H   = 156;
  const SHIELD_GAP = 8;
  // Reserve top space only when there is a center/final group with shield above it
  const Y_OFFSET = centerGroups.length ? SHIELD_H + SHIELD_GAP + 4 : 8;

  const container = document.createElement("div");
  container.id = "bracket-inner";
  container.style.cssText = `position:relative;width:${totalW}px;height:${totalH + 40 + Y_OFFSET}px;margin:0 auto;`;

  const svgEl = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svgEl.setAttribute("width", totalW);
  svgEl.setAttribute("height", totalH + 40 + Y_OFFSET);
  svgEl.style.cssText = "position:absolute;top:0;left:0;pointer-events:none;";
  container.appendChild(svgEl);

  function colX(ci) { return ci * (MATCH_W + COL_GAP); }

  function placeCard(g, x, yCenter, cardH) {
    const y   = yCenter - cardH / 2 + Y_OFFSET;
    const div = document.createElement("div");
    div.style.cssText = `position:absolute;left:${x}px;top:${y}px;width:${MATCH_W}px;`;
    div.innerHTML     = renderGroupCard(g);
    container.appendChild(div);
    return { x, y, yCenter: yCenter + Y_OFFSET };
  }

  function drawConnector(x1, y1, x2, y2) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const cx   = (x1 + x2) / 2;
    path.setAttribute("d", `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
    path.setAttribute("stroke", "#cc0000");
    path.setAttribute("stroke-width", "1.5");
    path.setAttribute("fill", "none");
    path.setAttribute("stroke-opacity", "0.5");
    svgEl.appendChild(path);
  }

  // ── LEFT COLUMNS ──────────────────────────────────────
  const leftPos = [];
  for (let ci = 0; ci < leftCols.length; ci++) {
    const col      = leftCols[ci];
    const yCenters = leftColYCenters[ci];
    const x        = colX(ci);
    const positions = [];
    col.forEach((g, gi) => {
      const h   = CARD_H(g);
      const pos = placeCard(g, x, yCenters[gi], h);
      positions.push({ x: x + MATCH_W, yCenter: pos.yCenter });
    });
    leftPos.push(positions);
  }

  // ── CENTER COLUMN ─────────────────────────────────────
  const centerColIdx = leftCols.length;
  if (centerGroups.length) {
    const x = colX(centerColIdx);
    centerGroups.forEach(g => {
      const h         = CARD_H(g);
      const yCenter   = totalH / 2;
      const cardTop   = yCenter - h / 2 + Y_OFFSET;
      const shieldX   = x + MATCH_W / 2 - SHIELD_H / 2;
      const shieldY   = cardTop - SHIELD_H - SHIELD_GAP;
      const totalContH = totalH + 40 + Y_OFFSET;

      // Store layout so descargarPDF can overlay the shield on the PDF
      window._shieldLayout = { x: shieldX, y: shieldY, w: SHIELD_H, h: SHIELD_H,
                                totalW, totalH: totalContH };

      const shield = document.createElement("img");
      shield.src   = shieldSrc;
      shield.style.cssText = `position:absolute;` +
        `left:${shieldX}px;top:${shieldY}px;` +
        `width:${SHIELD_H}px;height:${SHIELD_H}px;object-fit:contain;`;
      container.appendChild(shield);
      placeCard(g, x, yCenter, h);
    });
  }

  // ── RIGHT COLUMNS ─────────────────────────────────────
  const reversedRight        = [...rightCols].reverse();
  const reversedRightYCenters = [...rightColYCenters].reverse();
  const rightPos = [];

  for (let ci = 0; ci < reversedRight.length; ci++) {
    const col      = reversedRight[ci];
    const yCenters = reversedRightYCenters[ci];
    const colIdx   = centerColIdx + 1 + ci;
    const x        = colX(colIdx);
    const positions = [];
    col.forEach((g, gi) => {
      const h   = CARD_H(g);
      const pos = placeCard(g, x, yCenters[gi], h);
      positions.push({ x, yCenter: pos.yCenter });
    });
    rightPos.push(positions);
  }

  // ── CONNECTORS ────────────────────────────────────────
  // Left side
  for (let ci = 0; ci < leftCols.length - 1; ci++) {
    leftCols[ci].forEach((g, gi) => {
      if (!g.siguiente_grupo_id) return;
      const toIdx = leftCols[ci + 1].findIndex(tg => tg.id === g.siguiente_grupo_id);
      if (toIdx < 0) return;
      drawConnector(leftPos[ci][gi].x, leftPos[ci][gi].yCenter, colX(ci + 1), leftPos[ci + 1][toIdx].yCenter);
    });
  }
  // Left last → center
  if (centerGroups.length && leftCols.length) {
    const lastLeft    = leftCols[leftCols.length - 1];
    const lastLeftPos = leftPos[leftCols.length - 1];
    lastLeft.forEach((g, gi) => {
      if (!g.siguiente_grupo_id) return;
      if (!centerGroups.some(cg => cg.id === g.siguiente_grupo_id)) return;
      drawConnector(lastLeftPos[gi].x, lastLeftPos[gi].yCenter, colX(centerColIdx), totalH / 2 + Y_OFFSET);
    });
  }
  // Center → first right
  if (centerGroups.length && reversedRight.length) {
    reversedRight[0].forEach((g, gi) => {
      if (!centerGroups.some(cg => cg.id === g.siguiente_grupo_id)) return;
      drawConnector(colX(centerColIdx) + MATCH_W, totalH / 2 + Y_OFFSET, colX(centerColIdx + 1), rightPos[0][gi].yCenter);
    });
  }
  // Right side outward
  for (let ci = 0; ci < reversedRight.length - 1; ci++) {
    reversedRight[ci].forEach((g, gi) => {
      reversedRight[ci + 1].forEach((tg, tgi) => {
        if (tg.siguiente_grupo_id !== g.id) return;
        drawConnector(
          colX(centerColIdx + 1 + ci) + MATCH_W, rightPos[ci][gi].yCenter,
          colX(centerColIdx + 2 + ci), rightPos[ci + 1][tgi].yCenter
        );
      });
    });
  }

  wrapper.appendChild(container);
}

init();

async function descargarPDF() {
  const btn = document.getElementById("btn-download");
  btn.disabled = true;
  btn.textContent = "⏳ Generando...";

  try {
    // Capture the inner bracket container (exact content, no surrounding whitespace)
    const target = document.getElementById("bracket-inner") || document.getElementById("bracket");
    const canvas = await html2canvas(target, {
      backgroundColor: "#ffffff",
      scale: 3,
      logging: false,
    });

    const { jsPDF } = window.jspdf;
    const pdf   = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
    const pageW = pdf.internal.pageSize.getWidth();   // 297 mm
    const pageH = pdf.internal.pageSize.getHeight();  // 210 mm

    // Title at the top
    const title = (document.getElementById("bracket-title").textContent || "").toUpperCase();
    const titleSize = 14;
    const titleH    = 10; // mm reserved for title line
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(titleSize);
    pdf.setTextColor(0, 0, 0);
    pdf.text(title, pageW / 2, 8 + titleSize * 0.352 / 2, { align: "center" });

    // Scale bracket to fill remaining space, with margin
    const margin = 8; // mm
    const maxW = pageW - margin * 2;
    const maxH = pageH - margin - (margin + titleH);
    const ratio = canvas.width / canvas.height;
    let imgW = maxW, imgH = imgW / ratio;
    if (imgH > maxH) { imgH = maxH; imgW = imgH * ratio; }
    const x = (pageW - imgW) / 2;
    const y = margin + titleH;
    pdf.addImage(canvas.toDataURL("image/jpeg", 0.95), "JPEG", x, y, imgW, imgH);

    // Overlay shield (already base64 — bypasses any CORS restriction)
    if (shieldSrc && shieldSrc.startsWith("data:") && window._shieldLayout) {
      const sl     = window._shieldLayout;
      const scaleX = imgW / sl.totalW;
      const scaleY = imgH / sl.totalH;
      pdf.addImage(shieldSrc, "PNG",
        x + sl.x * scaleX,
        y + sl.y * scaleY,
        sl.w * scaleX,
        sl.h * scaleY
      );
    }

    const filename = (document.getElementById("bracket-title").textContent || "grupos").replace(/\s+/g, "_");
    pdf.save(filename + "_grupos.pdf");
  } catch(err) {
    alert("Error al generar el PDF: " + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = "⬇ Descargar PDF";
  }
}
</script>
